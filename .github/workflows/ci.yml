name: Node CI (learning)

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prepare artifacts folder
        run: mkdir -p artifacts

      - name: Run tests (capture output)
        run: |
          npm test 2>&1 | tee artifacts/test-output.txt

      - name: Create run info
        if: always()
        run: |
          {
            echo "Run: $GITHUB_RUN_ID"
            echo "Workflow: $GITHUB_WORKFLOW"
            echo "Job: $GITHUB_JOB"
            echo "Repo: $GITHUB_REPOSITORY"
            echo "Ref: $GITHUB_REF"
            echo "SHA: $GITHUB_SHA"
            echo ""
            echo "Node: $(node -v)"
            echo "NPM: $(npm -v)"
          } > artifacts/run-info.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-artifacts
          path: artifacts/

      - name: Summary
        if: always()
        run: |
          {
            echo "## CI summary"
            echo ""
            echo "- Repo: \`$GITHUB_REPOSITORY\`"
            echo "- Ref: \`$GITHUB_REF\`"
            echo "- SHA: \`$GITHUB_SHA\`"
            echo "- Node: \`$(node -v)\`"
            echo "- NPM: \`$(npm -v)\`"
            echo ""
            echo "Artifacts uploaded: **run-artifacts** (includes \`run-info.txt\` and \`test-output.txt\`)"
          } >> "$GITHUB_STEP_SUMMARY"
