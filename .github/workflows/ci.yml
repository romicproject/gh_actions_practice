name: Node CI (learning)

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Create a run log
        if: always()
        run: |
          echo "Run: $GITHUB_RUN_ID" > run.log
          echo "Commit: $GITHUB_SHA" >> run.log
          node -v >> run.log
          npm -v >> run.log

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-node-${{ matrix.node }}
          path: run.log
