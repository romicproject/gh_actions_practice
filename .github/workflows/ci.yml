name: Node CI (learning)

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install (npm ci)
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Create a run log
        if: always()
        run: |
          echo "Run: $GITHUB_RUN_ID" > run.log
          echo "Commit: $GITHUB_SHA" >> run.log
          node -v >> run.log
          npm -v >> run.log

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs
          path: run.log
